<div class="flex align-items-center gap-2">
  <p-floatLabel variant="on">
    <p-select
      id="dataListGridSortingDropdown"
      inputId="dataListGridSortingDropdownInput"
      [ngModel]="selectedSortingOption()"
      [options]="dropdownOptions()"
      (onChange)="selectSorting($event)"
      [ariaLabel]="('OCX_LIST_GRID_SORT.DROPDOWN.ARIA_LABEL' | translate)"
      optionLabel="columnName"
    >
      <ng-template let-item #item> 
        <span [attr.aria-label]="item?.columnName ? (item.columnName | translate) : ''">{{ item?.columnName ? (item.columnName | translate) : ''}}</span> 
      </ng-template>
      <ng-template let-item #selectedItem>
        <span [attr.aria-label]="item?.columnName ? (item.columnName | translate) : ''">{{ item?.columnName ? (item.columnName | translate) : ''}}</span>
      </ng-template></p-select
    >
    <label for="dataListGridSortingDropdownInput">{{ ("OCX_LIST_GRID_SORT.DROPDOWN.LABEL" | translate) }}</label>
  </p-floatLabel>
  <p-button
    id="dataListGridSortingButton"
    type="button"
    icon="pi {{sortIcon()}}"
    styleClass="p-button-outlined"
    (onClick)="sortDirectionChanged()"
    (keydown.enter)="sortDirectionChanged()"
    (keydown.space)="sortDirectionChanged()"
    [pTooltip]="(sortIconTitle() | translate)"
    tooltipPosition="top"
    [ariaLabel]="('OCX_LIST_GRID_SORT.SORTING_BUTTON_ARIA_LABEL' | translate:{currentDirection: sortDirection, nextDirection: (sortDirectionToTitle(nextSortDirection())) | translate})"
  ></p-button>
</div>
